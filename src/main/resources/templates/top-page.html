<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>掲示板</title>
  </head>
  <body>
    <div>
      <form
        action="#"
        th:action="@{/articles/insert}"
        th:object="${articleForm}"
        method="post"
      >
        <div>
          <label for="article-name">投稿者名：</label>
          <input type="text" id="article-name" th:field="*{name}" />
          <span
            style="color: red"
            th:if="${#fields.hasErrors('name')}"
            th:errors="*{name}"
          ></span>
        </div>
        <div>
          <label for="article-content">記事内容：</label>
          <textarea
            id="article-content"
            th:field="*{content}"
            rows="10"
            cols="40"
          ></textarea>
          <span
            style="color: red"
            th:if="${#fields.hasErrors('content')}"
            th:errors="*{content}"
          ></span>
        </div>
        <button type="submit">記事投稿</button>
      </form>
    </div>

    <hr />

    <div th:each="article : ${articles}">
      <div>
        投稿者名：<span th:text="${article.name}"></span><br />
        投稿内容：
        <p th:text="${article.content}"></p>

        <form th:action="@{/articles/delete}" method="post">
          <input type="hidden" name="articleId" th:value="${article.id}" />
          <button type="submit">記事削除</button>
        </form>
        <br />
      </div>

      <div th:each="comment : ${article.commentList}">
        コメント者名：<span th:text="${comment.name}"></span><br />
        コメント内容：
        <p th:text="${comment.content}"></p>
      </div>

      <form
        action="#"
        th:action="@{/articles/insert-comment}"
        th:object="${commentForm}"
        method="post"
      >
        <input type="hidden" name="articleId" th:value="${article.id}" />
        <div>
          <label for="comment-name">名前：</label><br />
          <input type="text" id="comment-name" th:field="*{name}" />
          <span
            style="color: red"
            th:if="${#fields.hasErrors('name')} and *{articleId} == ${article.id}"
            th:errors="*{name}"
          ></span>
        </div>
        <div>
          <label for="comment-content">コメント：</label><br />
          <textarea
            id="comment-content"
            th:field="*{content}"
            rows="10"
            cols="40"
          ></textarea>
          <span
            style="color: red"
            th:if="${#fields.hasErrors('content')} and *{articleId} == ${article.id}"
            th:errors="*{content}"
          ></span>
        </div>
        <button type="submit">コメント投稿</button>
      </form>
      <hr />
    </div>

    <div th:unless="${clothes}">まだ記事はありません</div>
  </body>
</html>
